apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "cortex.fullname" . }}-test-connection"
  labels:
    {{- include "cortex.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: connection-test
      image: curlimages/curl:8.17.0
      command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "Testing Cortex service connectivity..."
          
          SERVICE_NAME="{{ include "cortex.fullname" . }}"
          MAX_RETRIES=30
          RETRY_DELAY=7
          
          # Function to retry curl with timeout
          retry_curl() {
            local url=$1
            local description=$2
            local retries=0
            
            echo "Testing ${description}..."
            while [ $retries -lt $MAX_RETRIES ]; do
              if curl -f -s -o /dev/null -w "HTTP Status: %{http_code}\n" --max-time 10 "${url}" 2>/dev/null; then
                echo "${description} is accessible!"
                return 0
              fi
              retries=$((retries + 1))
              if [ $retries -lt $MAX_RETRIES ]; then
                echo "Waiting for ${description} to be ready... (attempt ${retries}/${MAX_RETRIES})"
                sleep ${RETRY_DELAY}
              fi
            done
            
            echo "ERROR: ${description} failed after ${MAX_RETRIES} attempts"
            return 1
          }
          
          # Test HTTP endpoint
          retry_curl \
            "http://${SERVICE_NAME}:{{ .Values.cortex.service.port }}/api/status" \
            "HTTP endpoint on port {{ .Values.cortex.service.port }}"
          
          echo "[SUCCESS] All connection tests passed."
