################################################################################
# TheHive with K8ssandra and ECK Operators
################################################################################
# Uses K8ssandra Operator for Cassandra and ECK Operator for Elasticsearch

thehive:
  database:
    username: "cassandra-superuser"
    k8sSecretName: "cassandra-credentials"
    k8sSecretKey: "password"
    hostnames:
      - "cassandra-datacenter1-service.k8ssandra-operator.svc.cluster.local"
  index:
    username: "elastic"
    k8sSecretName: "elasticsearch-credentials"
    k8sSecretKey: "password"
    hostnames:
      - "elasticsearch-es-http.elastic-system.svc.cluster.local"
  initContainers:
    checkElasticsearch:
      useHttps: false

# Disable Bitnami subcharts (using operators instead)
cassandra:
  enabled: false

elasticsearch:
  enabled: false
