apiVersion: v1
kind: Service
metadata:
  name: cassandra-external
spec:
  ports:
    - port: 9042
      targetPort: 9042
---
apiVersion: v1
kind: Endpoints
metadata:
  name: cassandra-external
subsets:
  - addresses:
      - ip: "${HOST_IP}"
    ports:
      - port: 9042
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch-external
spec:
  ports:
    - port: 9200
      targetPort: 9200
---
apiVersion: v1
kind: Endpoints
metadata:
  name: elasticsearch-external
subsets:
  - addresses:
      - ip: "${HOST_IP}"
    ports:
      - port: 9200
---
apiVersion: v1
kind: Service
metadata:
  name: minio-external
spec:
  ports:
    - port: 9002
---
apiVersion: v1
kind: Endpoints
metadata:
  name: minio-external
subsets:
  - addresses:
      - ip: "${HOST_IP}"
    ports:
      - port: 9002
